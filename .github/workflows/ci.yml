name: CI

on:
  pull_request:
    branches:
      - stage
      - main
    paths:
      - 'src/Pulso.AiWorker/**'
      - 'src/Pulso.AiWorker.Tests/**'
      - 'src/Pulso.Shared/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore src/Pulso.AiWorker.Tests/Pulso.AiWorker.Tests.csproj

      - name: Run .NET Tests
        run: |
          dotnet test src/Pulso.AiWorker.Tests/Pulso.AiWorker.Tests.csproj \
            -c Release \
            --no-restore
