name: Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'Caddyfile'
      - '.github/workflows/deploy-production.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------------------------------------------
      # 1. CONSTRUCCIÓN DE BACKENDS (.NET 10)
      # -------------------------------------------------------------
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: |
          dotnet restore src/Pulso.IngressApi/Pulso.IngressApi.csproj
          dotnet restore src/Pulso.AiWorker/Pulso.AiWorker.csproj
          dotnet restore src/Pulso.AiWorker.Tests/Pulso.AiWorker.Tests.csproj

      - name: Run .NET Tests
        run: |
          dotnet test src/Pulso.AiWorker.Tests/Pulso.AiWorker.Tests.csproj \
            -c Release \
            --no-restore

      - name: Publish API
        run: |
          dotnet publish src/Pulso.IngressApi/Pulso.IngressApi.csproj \
            -c Release \
            -o ./publish-api \
            --no-restore

      - name: Publish AI Worker
        run: |
          dotnet publish src/Pulso.AiWorker/Pulso.AiWorker.csproj \
            -c Release \
            -o ./publish-worker \
            --no-restore

      # -------------------------------------------------------------
      # 2. CONSTRUCCIÓN DEL FRONTEND (Node.js & Vite/Svelte)
      # -------------------------------------------------------------
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: src/Pulso.Pwa/pnpm-lock.yaml

      - name: Install PWA Dependencies
        working-directory: src/Pulso.Pwa
        run: pnpm install --frozen-lockfile

      - name: Build PWA
        working-directory: src/Pulso.Pwa
        # Analítica web (Umami) para PRODUCCIÓN. Valores públicos (no secretos): se
        # inyectan en el bundle en tiempo de build. Website ID del sitio pulsoaid.org.
        env:
          VITE_UMAMI_SRC: https://analytics.pulsoaid.org/script
          VITE_UMAMI_WEBSITE_ID: 24413562-d6ab-4535-8d5a-09391b28ed58
        run: pnpm build

      # -------------------------------------------------------------
      # 3. EMPAQUETAR ARTEFACTOS
      # -------------------------------------------------------------
      - name: Package Artifacts
        run: |
          tar -czf publish-api.tar.gz -C ./publish-api .
          tar -czf publish-worker.tar.gz -C ./publish-worker .
          tar -czf pwa-dist.tar.gz -C src/Pulso.Pwa/dist .

      # -------------------------------------------------------------
      # 4. TRANSFERENCIA Y DESPLIEGUE EN EL SERVIDOR VPS DE PRODUCCIÓN
      # -------------------------------------------------------------
      - name: Deploy to Production VPS via SSH/SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "publish-api.tar.gz,publish-worker.tar.gz,pwa-dist.tar.gz,Caddyfile"
          target: "/tmp"

      - name: Execute Remote Deploy Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            # Crear directorios si no existen
            sudo mkdir -p /opt/pulso/api
            sudo mkdir -p /opt/pulso/worker
            sudo mkdir -p /var/www/pulso/dist

            # Detener servicios temporalmente
            sudo systemctl stop pulso-api pulso-worker

            # Desplegar API
            sudo rm -rf /opt/pulso/api/*
            sudo tar -xzf /tmp/publish-api.tar.gz -C /opt/pulso/api/
            
            # Desplegar Worker
            sudo rm -rf /opt/pulso/worker/*
            sudo tar -xzf /tmp/publish-worker.tar.gz -C /opt/pulso/worker/
            
            # Desplegar PWA
            sudo rm -rf /var/www/pulso/dist/*
            sudo tar -xzf /tmp/pwa-dist.tar.gz -C /var/www/pulso/dist/

            # Actualizar Caddyfile y recargar caddy si se transfirió uno nuevo
            if [ -f /tmp/Caddyfile ]; then
              sudo cp /tmp/Caddyfile /etc/caddy/Caddyfile
              sudo systemctl reload caddy
              rm -f /tmp/Caddyfile
            fi

            # Limpiar temporales
            rm -f /tmp/publish-api.tar.gz /tmp/publish-worker.tar.gz /tmp/pwa-dist.tar.gz

            # Asegurar permisos correctos
            sudo chown -R ubuntu:ubuntu /opt/pulso
            sudo chown -R www-data:www-data /var/www/pulso/dist

            # Iniciar servicios
            sudo systemctl start pulso-api pulso-worker
            
            # Verificar estatus de servicios
            sudo systemctl is-active pulso-api pulso-worker
